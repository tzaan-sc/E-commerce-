# ===============================
# AI Configuration (Google Gemini via OpenAI Bridge)
# ===============================
# 1. Điền API Key Gemini của bạn vào đây (đã lấy từ biến môi trường)
spring.ai.openai.api-key=${GOOGLE_AI_API_KEY}

# 2. Cấu hình URL để gọi sang Google (Phải có /v1beta/openai/ ở cuối)
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/

# 3. Cấu hình Model Chat (Bắt buộc dùng tên model của Gemini)
spring.ai.openai.chat.options.model=gemini-1.5-flash

# 4. Cấu hình Model Embedding (Phải sửa đúng thế này để tránh lỗi 404)
spring.ai.openai.embedding.options.model=text-embedding-004

# Đường dẫn lưu trữ Vector Store cục bộ
app.ai.vector-store-path=vector-store.json

